- hosts: all
  become: yes

  tasks:
    - name: 1. Atualizar repositórios
      zypper:
        name: '*'
        update_cache: yes

    - name: 2. Aplicar atualizações
      zypper:
        name: '*'
        state: latest
      register: update_result

    - name: 3. Reiniciar servidor (Obrigatório)
      reboot:
        msg: "Reboot mandatório pós-manutenção"
        reboot_timeout: 600

    - name: 4. Exibir relatório final
      debug:
        msg: >
          PROCESSO FINALIZADO:
          - As atualizações foram enviadas ao SO.
          - O servidor foi reiniciado.